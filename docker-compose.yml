version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: eldercare-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: eldercare123
      MONGO_INITDB_DATABASE: eldercare
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - eldercare-network

  redis:
    image: redis:7-alpine
    container_name: eldercare-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - eldercare-network

  # 可选：MongoDB管理界面
  mongo-express:
    image: mongo-express:1.0.2
    container_name: eldercare-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: eldercare123
      ME_CONFIG_MONGODB_URL: mongodb://admin:eldercare123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongodb
    networks:
      - eldercare-network

volumes:
  mongodb_data:
  redis_data:

networks:
  eldercare-network:
    driver: bridge


